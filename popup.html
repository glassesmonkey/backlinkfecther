<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Sim 导出器</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        width: 320px;
        background: #f6f8fb;
        color: #18212f;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #d9e0ea;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 6px 18px rgba(24, 33, 47, 0.06);
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .status-row:last-child {
        margin-bottom: 0;
      }

      .label {
        color: #5a6778;
      }

      .value {
        font-weight: 600;
        text-align: right;
        word-break: break-word;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 14px;
        background: #0f6fff;
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        background: #a4b4cb;
        cursor: not-allowed;
      }

      .button-group {
        display: flex;
        gap: 8px;
        margin: 14px 0 12px;
      }

      .button-group button {
        margin: 0;
      }

      .secondary-button {
        background: #e7eef8;
        color: #355070;
      }

      .secondary-button:disabled {
        background: #eef2f7;
        color: #94a3b8;
      }

      .hint {
        margin: 10px 0 0;
        color: #5a6778;
        font-size: 12px;
        line-height: 1.5;
      }

      .error {
        color: #b42318;
      }

      .success {
        color: #027a48;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sim 导出器</h1>
      <div class="card">
        <div class="status-row">
          <span class="label">当前页</span>
          <span class="value" id="page-match">检测中</span>
        </div>
        <div class="button-group">
          <button id="start-button" disabled>开始导出</button>
          <button id="resume-button" class="secondary-button" disabled>继续任务</button>
        </div>
        <div class="status-row">
          <span class="label">状态</span>
          <span class="value" id="phase-text">空闲</span>
        </div>
        <div class="status-row">
          <span class="label">页码</span>
          <span class="value" id="page-progress">-</span>
        </div>
        <div class="status-row">
          <span class="label">域名</span>
          <span class="value" id="host-progress">-</span>
        </div>
        <div class="status-row">
          <span class="label">流量查询</span>
          <span class="value" id="traffic-progress">-</span>
        </div>
        <div class="status-row">
          <span class="label">当前来源</span>
          <span class="value" id="active-provider">-</span>
        </div>
        <div class="status-row">
          <span class="label">来源恢复</span>
          <span class="value" id="provider-cooldowns">-</span>
        </div>
        <div class="status-row">
          <span class="label">跳过</span>
          <span class="value" id="skipped-count">0</span>
        </div>
        <p class="hint" id="message-text">只支持 sim.3ue.com 反向链接列表页。</p>
        <details style="margin-top:12px;">
          <summary style="cursor:pointer;color:#5a6778;font-size:12px;">最近日志</summary>
          <pre id="log-output" style="margin:10px 0 0;padding:10px;background:#f6f8fb;border:1px solid #d9e0ea;border-radius:8px;font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto;">暂无日志</pre>
        </details>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
